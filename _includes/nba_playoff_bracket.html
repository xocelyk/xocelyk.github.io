<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .bracket-scope {
    --bg: #ffffff;
    --panel: #f7f7f5;
    --ink: #313131;
    --text: #515151;
    --dim: #8a8a8a;
    --faint: #b5b5b5;
    --rule: #e6e6e6;
    --rule-strong: #313131;
    --card-rule: #e0e0e0;
    --row-rule: #ececec;
    --bar-bg: #ececec;
    --accent: #33CEFF;
    --s4: #6b92c2;
    --s5: #7fb5cc;
    --s6: #88c0a8;
    --s7: #d0b880;
    background: var(--bg); color: var(--text);
  }
  * { box-sizing: border-box; }
  .bracket-scope {
    font-family: 'Google Sans Code', ui-monospace, monospace; font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
  }
  .bracket-scope .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 0 48px; }

  header.hero { margin-bottom: 24px; }
  header.hero h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; color: var(--ink); }
  header.hero .meta { color: var(--dim); font-size: 13px; }
  header.hero .back-link {
    display: inline-block; margin-bottom: 10px;
    font-size: 11px; letter-spacing: 0.02em;
    color: var(--dim) !important; text-decoration: none;
  }
  header.hero .back-link:hover { color: var(--ink) !important; }

  .legend {
    display: flex; gap: 18px; flex-wrap: wrap; align-items: center;
    margin-bottom: 24px; font-size: 12px; color: var(--dim);
    padding-bottom: 14px; border-bottom: 1px solid var(--rule);
  }
  .legend .swatch { display: inline-flex; align-items: center; gap: 6px; }
  .legend .bar-demo { display: inline-flex; height: 4px; width: 28px; }
  .legend .bar-demo span { flex: 1; }

  .loading { text-align: center; padding: 60px 20px; color: var(--dim); font-size: 13px; }
  .loading .spinner {
    display: inline-block; width: 12px; height: 12px; border: 2px solid var(--rule);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bracket {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr) 260px;
    grid-template-rows: auto 1px auto;
    column-gap: 24px;
    align-items: stretch;
    position: relative;
  }
  .round { display: contents; }
  .conf-sep {
    grid-column: 1 / 4; grid-row: 2;
    background: var(--rule); height: 1px;
    z-index: 1;
  }
  .bracket-lines {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    overflow: visible;
  }
  .bracket-lines path { stroke: var(--rule); stroke-width: 1; fill: none; }
  .match { z-index: 1; }
  /* raise the hovered card (and its tooltip) above neighbouring cards */
  .match:hover { z-index: 20; }
  @media (max-width: 900px) { .bracket-lines { display: none; } }
  .conf-group { display: flex; flex-direction: column; padding: 20px 0; min-width: 0; }
  .round.r1 .conf-group    { grid-column: 1; }
  .round.semis .conf-group { grid-column: 2; }
  .round.cf .conf-group    { grid-column: 3; }
  .round.r1 .conf-group.east,
  .round.semis .conf-group.east,
  .round.cf .conf-group.east { grid-row: 1; }
  .round.r1 .conf-group.west,
  .round.semis .conf-group.west,
  .round.cf .conf-group.west { grid-row: 3; }
  .round.finals {
    display: flex; flex-direction: column;
    grid-column: 4; grid-row: 1 / 4;
    padding: 20px 0;
  }

  /* equal-height tracks + center-aligned cards so next-round games land
     exactly at the midpoint of the two games that feed them, regardless
     of individual card content height */
  .col-cards {
    flex: 1; display: grid;
    grid-auto-rows: minmax(0, 1fr);
    align-items: center;
    gap: 16px;
  }
  .col-title {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim); font-weight: 600; margin-bottom: 12px;
  }
  /* Keep empty titles in the layout so alignment across columns/panels
     stays consistent even when a round doesn't render a label. */
  .col-title:empty::before { content: "\00a0"; }

  /* round-nav shows only on mobile */
  .round-nav { display: none; }

  .match {
    background: var(--panel); border: 1px solid var(--card-rule);
    border-radius: 3px;
    padding: 10px 12px; position: relative;
  }
  .match .round-tag {
    display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 8px;
  }

  .team {
    display: grid; grid-template-columns: 20px 1fr auto; align-items: center;
    gap: 8px; padding: 5px 0 3px;
  }
  .team + .team { border-top: 1px solid var(--row-rule); margin-top: 2px; }
  .seed { font-size: 11px; color: var(--dim); text-align: center; }
  .team-name { display: flex; align-items: baseline; gap: 6px; font-size: 14px; color: var(--ink); }
  .team-name .abbr { font-weight: 600; }
  .team-name .full { color: var(--dim); font-size: 12px; }
  .win-pct { font-size: 13px; font-weight: 600; color: var(--ink); min-width: 38px; text-align: right; }
  .win-pct.dim { color: var(--dim); font-weight: 400; }

  .dist { margin-top: 3px; padding-left: 28px; padding-right: 2px; position: relative; }
  .dist:hover::after {
    content: attr(data-tip);
    position: absolute; top: calc(100% + 4px); left: 28px;
    background: #313131; color: #fff;
    font-size: 10.5px; padding: 5px 8px; border-radius: 3px;
    white-space: nowrap; z-index: 10; pointer-events: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .dist .bar { display: flex; height: 5px; background: var(--bar-bg); }

  /* Muted, still distinct — 4g darkest to 7g lightest, cool→warm */
  .s4 { background: var(--s4, #6b92c2); }  /* soft blue — 4 games */
  .s5 { background: var(--s5, #7fb5cc); }  /* soft cyan — 5 games */
  .s6 { background: var(--s6, #88c0a8); }  /* soft mint — 6 games */
  .s7 { background: var(--s7, #d0b880); }  /* soft gold — 7 games */

  .team.dog .team-name .abbr { color: var(--dim); font-weight: 500; }

  /* series score banner, shown on cards whose matchup is locked in */
  .series-score {
    display: flex; align-items: baseline; gap: 8px;
    margin: 0 0 8px;
    font-size: 11px; color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .series-score .series-label {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim); font-weight: 600;
  }
  .series-score.is-final .series-label { color: var(--ink); }
  .series-score .series-score-line { font-weight: 600; }
  .series-score .dash { color: var(--dim); font-weight: 400; margin: 0 2px; }

  /* eliminated team row on a completed series */
  .team.eliminated .team-name .abbr { text-decoration: line-through; }
  .team.eliminated .team-name .abbr,
  .team.eliminated .team-name .full,
  .team.eliminated .seed,
  .team.eliminated .win-pct,
  .team.eliminated .team-dot { opacity: 0.5; }

  .expand-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: calc(100% + 24px);
    margin: 10px -12px -10px;
    padding: 7px 10px;
    background: rgba(0, 0, 0, 0.025);
    border: none;
    border-top: 1px solid var(--card-rule);
    border-radius: 0 0 2px 2px;
    font-family: inherit; font-size: 11px; color: var(--text); cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .expand-btn:hover,
  .expand-btn:focus-visible {
    background: rgba(0, 0, 0, 0.055);
    color: var(--ink);
    outline: none;
  }
  .expand-btn .expand-open { display: none; }
  .match.expanded .expand-btn .expand-closed { display: none; }
  .match.expanded .expand-btn .expand-open { display: inline; }
  .expand-btn .expand-caret {
    display: inline-block; font-size: 9px; line-height: 1;
    transition: transform 0.15s ease;
  }
  .match.expanded .expand-btn .expand-caret { transform: rotate(180deg); }

  footer.foot {
    margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--rule);
    color: var(--dim); font-size: 12px; display: flex; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  footer.foot a { color: var(--dim); }

  /* tablet: collapse Finals into its own row below the conferences */
  @media (max-width: 900px) and (min-width: 701px) {
    .bracket {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
      grid-template-rows: auto 1px auto auto;
    }
    .round.finals {
      grid-column: 1 / 4; grid-row: 4;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
    }
    .round.finals .col-cards { max-width: 320px; margin: 0 auto; width: 100%; }
  }

  /* mobile: horizontal scroll with scroll-snap — one swipe per round */
  @media (max-width: 700px) {
    .bracket {
      display: flex; flex-direction: row;
      overflow-x: auto; overflow-y: visible;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      column-gap: 0;
      /* break out of container's horizontal padding / 90% max-width so
         each round can span the full viewport */
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding: 0 16px;
      scroll-padding: 0 16px;
    }
    .bracket::-webkit-scrollbar { height: 6px; }
    .bracket::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

    /* Every round uses the same 11-row grid so card spans position
       each card at a bracket-correct midpoint within its own panel
       (Semis cards between R1 pairs, CF mid-conference, Finals at
       the E/W boundary). 140px is roughly half the R1 card height:
       enough breathing room around Semis/CF cards that the bracket
       "Y" shape reads, without reserving the ~160px of blank space
       per slot that made earlier rounds feel empty. */
    .round {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows:
        minmax(24px, auto)                  /*  1  east title     */
        repeat(4, minmax(140px, auto))      /*  2–5  east slots   */
        28px                                /*  6  east/west gap  */
        minmax(24px, auto)                  /*  7  west title     */
        repeat(4, minmax(140px, auto));     /*  8–11 west slots   */
      row-gap: 12px;
      flex: 0 0 calc(100vw - 32px);
      scroll-snap-align: center;
      scroll-snap-stop: always;
      align-content: start;
    }
    .round + .round { margin-left: 16px; }
    .conf-sep { display: none; }
    .conf-group { display: contents; }
    .col-cards { display: contents; }

    /* conference titles */
    .round .conf-group.east > .col-title { grid-row: 1; }
    .round .conf-group.west > .col-title { grid-row: 7; }
    .round.finals > .col-title { grid-row: 1; }
    .round .col-title {
      color: var(--ink); font-weight: 600; font-size: 11px;
      padding-bottom: 8px; margin-bottom: 0;
    }

    /* R1: one card per slot */
    .round.r1 .conf-group.east > .col-cards > :nth-child(1) { grid-row: 2; }
    .round.r1 .conf-group.east > .col-cards > :nth-child(2) { grid-row: 3; }
    .round.r1 .conf-group.east > .col-cards > :nth-child(3) { grid-row: 4; }
    .round.r1 .conf-group.east > .col-cards > :nth-child(4) { grid-row: 5; }
    .round.r1 .conf-group.west > .col-cards > :nth-child(1) { grid-row: 8; }
    .round.r1 .conf-group.west > .col-cards > :nth-child(2) { grid-row: 9; }
    .round.r1 .conf-group.west > .col-cards > :nth-child(3) { grid-row: 10; }
    .round.r1 .conf-group.west > .col-cards > :nth-child(4) { grid-row: 11; }

    /* Semis: each card spans 2 R1 slots, centred vertically */
    .round.semis .conf-group.east > .col-cards > :nth-child(1) { grid-row: 2 / 4; align-self: center; }
    .round.semis .conf-group.east > .col-cards > :nth-child(2) { grid-row: 4 / 6; align-self: center; }
    .round.semis .conf-group.west > .col-cards > :nth-child(1) { grid-row: 8 / 10; align-self: center; }
    .round.semis .conf-group.west > .col-cards > :nth-child(2) { grid-row: 10 / 12; align-self: center; }

    /* Conf Finals: single card spans all 4 slots */
    .round.cf .conf-group.east > .col-cards > * { grid-row: 2 / 6; align-self: center; }
    .round.cf .conf-group.west > .col-cards > * { grid-row: 8 / 12; align-self: center; }

    /* Override desktop .round.finals so it joins the mobile grid system */
    .round.finals {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows:
        minmax(24px, auto)
        repeat(4, minmax(140px, auto))
        28px
        minmax(24px, auto)
        repeat(4, minmax(140px, auto));
      row-gap: 12px;
      grid-column: auto;
      grid-row: auto;
      padding: 0;
      align-content: start;
    }
    /* NBA Finals: single card spans entire grid, lands at East/West midpoint */
    .round.finals > .col-cards > * { grid-row: 2 / 12; align-self: center; }

    /* round indicator bar above the scroll area */
    .round-nav {
      display: flex; gap: 6px; justify-content: center;
      margin-bottom: 24px;
    }
    .round-nav button {
      flex: 1; max-width: 80px;
      background: none; border: 1px solid var(--rule);
      color: var(--dim); font-family: inherit; font-size: 10px;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 6px 4px; cursor: pointer;
    }
    .round-nav button[aria-current="true"] {
      color: var(--ink); border-color: var(--rule-strong);
      font-weight: 600;
    }
  }
</style>
<div class="bracket-scope" id="bracket-scope">
<div class="wrap">

<header class="hero">
  <a class="back-link" href="/nba/">← NBA Forecast</a>
  <h1>Playoff Bracket</h1>
  <div class="meta" id="sim-meta">loading sims…</div>
</header>

<div class="legend">
  <span style="color: var(--ink); font-weight:600;">Series length:</span>
  <span class="swatch"><i class="bar-demo"><span class="s4"></span></i> 4</span>
  <span class="swatch"><i class="bar-demo"><span class="s5"></span></i> 5</span>
  <span class="swatch"><i class="bar-demo"><span class="s6"></span></i> 6</span>
  <span class="swatch"><i class="bar-demo"><span class="s7"></span></i> 7</span>
  <span style="margin-left:auto;">bar width = P(win series in N games)</span>
</div>

<div id="content">
  <div class="loading"><span class="spinner"></span>Fetching playoff simulation data…</div>
</div>

</div>
</div>

<script>
const PROBS_URL = "https://raw.githubusercontent.com/xocelyk/nba/main/data/playoff_sim_results/playoff_slot_probs.json";

// Team display info (colors + full names). Unknown teams fall back to a gray dot.
const teams = {
  ATL:{name:"Hawks",color:"#E03A3E"}, BOS:{name:"Celtics",color:"#007A33"},
  BRK:{name:"Nets",color:"#BBBBBB"},  CHO:{name:"Hornets",color:"#1D1160"},
  CHI:{name:"Bulls",color:"#CE1141"}, CLE:{name:"Cavaliers",color:"#860038"},
  DAL:{name:"Mavericks",color:"#00538C"}, DEN:{name:"Nuggets",color:"#0E2240"},
  DET:{name:"Pistons",color:"#C8102E"}, GSW:{name:"Warriors",color:"#1D428A"},
  HOU:{name:"Rockets",color:"#CE1141"}, IND:{name:"Pacers",color:"#FDBB30"},
  LAC:{name:"Clippers",color:"#C8102E"}, LAL:{name:"Lakers",color:"#552583"},
  MEM:{name:"Grizzlies",color:"#5D76A9"}, MIA:{name:"Heat",color:"#98002E"},
  MIL:{name:"Bucks",color:"#00471B"}, MIN:{name:"Timberwolves",color:"#236192"},
  NOP:{name:"Pelicans",color:"#0C2340"}, NYK:{name:"Knicks",color:"#F58426"},
  OKC:{name:"Thunder",color:"#007AC1"}, ORL:{name:"Magic",color:"#0077C0"},
  PHI:{name:"76ers",color:"#006BB6"}, PHX:{name:"Suns",color:"#E56020"},
  POR:{name:"Blazers",color:"#E03A3E"}, SAC:{name:"Kings",color:"#5A2D81"},
  SAS:{name:"Spurs",color:"#C4CED4"}, TOR:{name:"Raptors",color:"#CE1141"},
  UTA:{name:"Jazz",color:"#002B5C"}, WAS:{name:"Wizards",color:"#002B5C"},
};
const teamInfo = abbr => teams[abbr] || {name:"", color:"#555"};

/* ---------- fetch pre-aggregated probs ---------- */

async function loadAndRender() {
  const res = await fetch(PROBS_URL);
  if (!res.ok) throw new Error(`fetch ${PROBS_URL} → ${res.status}`);
  const payload = await res.json();
  const { year, n_sims: nSims, slots } = payload;

  const slotList = slots.map(s => {
    const cands = s.candidates.map(c => {
      const dist = c.wins.map(w => w / nSims);
      const win = dist.reduce((a, b) => a + b, 0);
      return { abbr: c.team, seed: c.seed, dist, win };
    }).sort((a, b) => b.win - a.win);
    return {
      round: s.round, conf: s.conference, slot: s.slot,
      cands, nSims,
      series: s.series || null  // { status: "in_progress"|"complete", games_won: { ABBR: n } }
    };
  });

  render(slotList, { nSims, year });
}

/* ---------- rendering ---------- */

function fmtPct(p) {
  // Exact 0 and 1 only come from a decided series (loser/winner).
  if (p === 0) return "0%";
  if (p === 1) return "100%";
  if (p >= 0.995) return ">99%";
  if (p < 0.005) return "<1%";
  return Math.round(p * 100) + "%";
}

function distBar(dist, totalWin) {
  const segs = dist.map((v, i) => `<span class="s${i+4}" style="flex:${v||0.0001}"></span>`).join("");
  const empty = Math.max(0, 1 - totalWin);
  const emptySeg = empty > 0 ? `<span style="flex:${empty}; background: transparent;"></span>` : "";
  const totalPct = (totalWin*100).toFixed(1);
  const tip = dist.map((v, i) => `${i+4}g ${(v*100).toFixed(1)}%`).join(" · ") + ` · win ${totalPct}%`;
  return `
    <div class="dist" data-tip="${tip}">
      <div class="bar">${segs}${emptySeg}</div>
    </div>`;
}

function teamRow(t, isFav, series) {
  const info = teamInfo(t.abbr);
  const isComplete = series && series.status === "complete";
  const isEliminated = isComplete && t.win === 0;
  // Hide the per-team distribution bar for decided series — the winner's
  // is a single degenerate spike and the loser's is empty.
  const showDist = !isComplete;
  return `
    <div class="team ${isFav ? 'fav' : 'dog'} ${isEliminated ? 'eliminated' : ''}">
      <div class="seed">${t.seed ?? ""}</div>
      <div class="team-name">
        <span class="team-dot" style="width:8px;height:8px;border-radius:50%;background:${info.color};flex-shrink:0;"></span>
        <span class="abbr">${t.abbr}</span><span class="full">${info.name}</span>
      </div>
      <div class="win-pct ${isFav ? '' : 'dim'}">${fmtPct(t.win)}</div>
    </div>
    ${showDist ? distBar(t.dist, t.win) : ""}
  `;
}

function seriesBanner(s) {
  if (!s.series) return "";
  // Prefer higher-seed team first on the score line. Falls back to candidates
  // order when seeds are missing.
  const pair = [...s.cands].sort((a, b) => (a.seed ?? 99) - (b.seed ?? 99)).slice(0, 2);
  if (pair.length < 2) return "";
  const [a, b] = pair;
  const gw = s.series.games_won || {};
  const aw = gw[a.abbr] ?? 0, bw = gw[b.abbr] ?? 0;
  const status = s.series.status;
  const labelMap = {
    not_started: "",
    in_progress: "Series",
    complete: "Final"
  };
  const label = labelMap[status] ?? "Series";
  return `<div class="series-score ${status === 'complete' ? 'is-final' : ''}">
    ${label ? `<span class="series-label">${label}</span>` : ""}
    <span class="series-score-line">${a.abbr} ${aw} <span class="dash">–</span> ${bw} ${b.abbr}</span>
  </div>`;
}

let _slotSeq = 0;
function slotCard(s, opts = {}) {
  const { maxShown = 5, label } = opts;
  const id = `slot-${_slotSeq++}`;

  const filtered = s.cands.filter(c => c.win > 0.0005);
  const filteredTotal = filtered.reduce((sum, c) => sum + c.win, 0);

  // Resolve effective series state. Prefer the upstream 'series' block
  // when the sim feed provides it; otherwise synthesize a not_started
  // block when the matchup is effectively locked (exactly two candidates
  // with probability summing to ~100%, e.g. a 3-vs-6 or 4-vs-5 R1
  // matchup that's determined by final standings before play-in).
  let series = s.series;
  let teams;
  if (series) {
    teams = s.cands.slice();              // preserve 0% loser from upstream
  } else if (filtered.length === 2 && filteredTotal > 0.999) {
    series = {
      status: "not_started",
      games_won: Object.fromEntries(filtered.map(c => [c.abbr, 0]))
    };
    teams = filtered;
  } else {
    teams = filtered;
  }

  const shown = teams.slice(0, maxShown);
  const rest = teams.slice(maxShown);
  const restWin = rest.reduce((a,c)=>a+c.win, 0);
  const collapsedRows = shown.map((c,i) => teamRow(c, i === 0, series)).join("");
  const expandedRows = teams.map((c,i) => teamRow(c, i === 0, series)).join("");
  const toggleBtn = rest.length > 0 ? `
    <button class="expand-btn" data-target="${id}" aria-expanded="false">
      <span class="expand-closed">${rest.length} more · ${fmtPct(restWin)}</span>
      <span class="expand-open">show fewer</span>
      <span class="expand-caret" aria-hidden="true">&#9662;</span>
    </button>` : "";
  const header = `<div class="round-tag">${label || s.slot}</div>`;
  const cardCls = ["match"];
  if (series) cardCls.push("has-series");
  if (series && series.status === "complete") cardCls.push("series-complete");
  return `<div class="${cardCls.join(" ")}" id="${id}">
    ${header}
    ${seriesBanner({ ...s, series, cands: teams })}
    <div class="rows-collapsed">${collapsedRows}</div>
    <div class="rows-expanded" hidden>${expandedRows}</div>
    ${toggleBtn}
  </div>`;
}

function render(slotList, { nSims, year }) {
  document.getElementById("sim-meta").textContent = `${nSims.toLocaleString()} sims · updated ${new Date().toISOString().slice(0,10)}`;

  const bySlot = key => slotList.find(s => `${s.round}|${s.conf}|${s.slot}` === key);
  const pickRound = (round, conf) =>
    slotList.filter(s => s.round === round && s.conf === conf)
            .sort((a,b) => a.slot.localeCompare(b.slot));

  // East R1: E_1_8, E_4_5, E_2_7, E_3_6 — arrange so bracket reads top-to-bottom naturally
  const r1Order = ["_1_8", "_4_5", "_2_7", "_3_6"];
  const r2Order = ["_1_4", "_2_3"];

  const sortByPattern = (arr, patterns) => {
    return arr.slice().sort((a,b) => {
      const ai = patterns.findIndex(p => a.slot.endsWith(p));
      const bi = patterns.findIndex(p => b.slot.endsWith(p));
      return ai - bi;
    });
  };

  const e_r1 = sortByPattern(pickRound("R1", "East"), r1Order);
  const w_r1 = sortByPattern(pickRound("R1", "West"), r1Order);
  const e_r2 = sortByPattern(pickRound("CONF_SEMIS", "East"), r2Order);
  const w_r2 = sortByPattern(pickRound("CONF_SEMIS", "West"), r2Order);
  const e_cf = pickRound("CONF_FINALS", "East");
  const w_cf = pickRound("CONF_FINALS", "West");
  const fin = slotList.filter(s => s.round === "FINALS");

  const r1Label = s => `1st Round · ${s.slot.replace("E_","").replace("W_","").replace("_","–")} seed`;
  const r2Label = s => `Conf Semis · ${s.slot.replace("E_","").replace("W_","").replace("_","–")} bracket`;

  const roundSection = (roundKey, eastCards, westCards, eastLabel, westLabel) => `
    <div class="round ${roundKey}" data-round="${roundKey}">
      <div class="conf-group east">
        <div class="col-title">${eastLabel}</div>
        <div class="col-cards">${eastCards}</div>
      </div>
      <div class="conf-group west">
        <div class="col-title">${westLabel}</div>
        <div class="col-cards">${westCards}</div>
      </div>
    </div>`;

  const html = `
  <nav class="round-nav" aria-label="Jump to round">
    <button type="button" data-round="r1" aria-current="true">1st Round</button>
    <button type="button" data-round="semis">Semis</button>
    <button type="button" data-round="cf">Conf Finals</button>
    <button type="button" data-round="finals">Finals</button>
  </nav>
  <div class="bracket" id="bracket">
    <svg class="bracket-lines" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="conf-sep" aria-hidden="true"></div>
    ${roundSection("r1",
      e_r1.map(s => slotCard(s, { maxShown: 4, label: r1Label(s) })).join(""),
      w_r1.map(s => slotCard(s, { maxShown: 4, label: r1Label(s) })).join(""),
      "East", "West")}
    ${roundSection("semis",
      e_r2.map(s => slotCard(s, { maxShown: 4, label: r2Label(s) })).join(""),
      w_r2.map(s => slotCard(s, { maxShown: 4, label: r2Label(s) })).join(""),
      "", "")}
    ${roundSection("cf",
      e_cf.map(s => slotCard(s, { maxShown: 6, label: "Conf Finals" })).join(""),
      w_cf.map(s => slotCard(s, { maxShown: 6, label: "Conf Finals" })).join(""),
      "", "")}
    <div class="round finals" data-round="finals">
      <div class="col-title"></div>
      <div class="col-cards">${fin.map(s => slotCard(s, { maxShown: 10, label: "NBA Finals" })).join("")}</div>
    </div>
  </div>
  `;
  document.getElementById("content").innerHTML = html;

  document.querySelectorAll(".expand-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const card = document.getElementById(btn.dataset.target);
      const expanded = card.classList.toggle("expanded");
      btn.setAttribute("aria-expanded", expanded ? "true" : "false");
      card.querySelector(".rows-collapsed").hidden = expanded;
      card.querySelector(".rows-expanded").hidden = !expanded;
    });
  });

  // Mobile round-nav: click jumps to round; scrolling updates active button.
  const bracketEl = document.getElementById("bracket");
  const navBtns = document.querySelectorAll(".round-nav button");
  const roundEls = Array.from(document.querySelectorAll(".bracket .round"));

  navBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      const target = roundEls.find(r => r.dataset.round === btn.dataset.round);
      if (!target) return;
      const left = target.getBoundingClientRect().left
                 - bracketEl.getBoundingClientRect().left
                 + bracketEl.scrollLeft;
      bracketEl.scrollTo({ left, behavior: "smooth" });
    });
  });

  let scrollTimer;
  bracketEl.addEventListener("scroll", () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const bRect = bracketEl.getBoundingClientRect();
      let best = null, bestDist = Infinity;
      roundEls.forEach(r => {
        const d = Math.abs(r.getBoundingClientRect().left - bRect.left);
        if (d < bestDist) { bestDist = d; best = r; }
      });
      if (best) {
        const key = best.dataset.round;
        navBtns.forEach(b => b.setAttribute("aria-current", b.dataset.round === key ? "true" : "false"));
      }
    }, 60);
  }, { passive: true });

  // Draw bracket connector lines (desktop only)
  requestAnimationFrame(drawBracketLines);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(drawBracketLines);
  }
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(drawBracketLines, 80);
  });
  // Redraw after a card is expanded/collapsed since heights shift.
  document.querySelectorAll(".expand-btn").forEach(btn => {
    btn.addEventListener("click", () => setTimeout(drawBracketLines, 0));
  });
}

function drawBracketLines() {
  const bracket = document.getElementById("bracket");
  if (!bracket) return;
  const svg = bracket.querySelector(".bracket-lines");
  if (!svg) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (window.innerWidth <= 900) return;

  const bRect = bracket.getBoundingClientRect();
  svg.setAttribute("viewBox", `0 0 ${bRect.width} ${bRect.height}`);
  svg.setAttribute("width", bRect.width);
  svg.setAttribute("height", bRect.height);

  const q = sel => Array.from(document.querySelectorAll(sel));
  const r1 = {
    east: q(".round.r1 .conf-group.east .match"),
    west: q(".round.r1 .conf-group.west .match")
  };
  const semis = {
    east: q(".round.semis .conf-group.east .match"),
    west: q(".round.semis .conf-group.west .match")
  };
  const cf = {
    east: q(".round.cf .conf-group.east .match"),
    west: q(".round.cf .conf-group.west .match")
  };
  const finals = document.querySelector(".round.finals .match");

  const rect = el => {
    const r = el.getBoundingClientRect();
    return {
      left: r.left - bRect.left,
      right: r.right - bRect.left,
      midY: (r.top + r.bottom) / 2 - bRect.top
    };
  };

  const parts = [];
  const connect = (f1el, f2el, nextEl) => {
    const f1 = rect(f1el), f2 = rect(f2el), n = rect(nextEl);
    const midX = (Math.max(f1.right, f2.right) + n.left) / 2;
    parts.push(`M ${f1.right} ${f1.midY} L ${midX} ${f1.midY}`);
    parts.push(`M ${f2.right} ${f2.midY} L ${midX} ${f2.midY}`);
    parts.push(`M ${midX} ${f1.midY} L ${midX} ${f2.midY}`);
    parts.push(`M ${midX} ${n.midY} L ${n.left} ${n.midY}`);
  };

  ["east", "west"].forEach(conf => {
    if (r1[conf].length === 4 && semis[conf].length === 2) {
      connect(r1[conf][0], r1[conf][1], semis[conf][0]);
      connect(r1[conf][2], r1[conf][3], semis[conf][1]);
    }
    if (semis[conf].length === 2 && cf[conf].length === 1) {
      connect(semis[conf][0], semis[conf][1], cf[conf][0]);
    }
  });
  if (cf.east.length === 1 && cf.west.length === 1 && finals) {
    connect(cf.east[0], cf.west[0], finals);
  }

  if (parts.length) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", parts.join(" "));
    svg.appendChild(path);
  }
}

loadAndRender().catch(err => {
  document.getElementById("content").innerHTML =
    `<div class="loading" style="color:#ff6b4a">Failed to load: ${err.message}</div>`;
  console.error(err);
});
</script>
